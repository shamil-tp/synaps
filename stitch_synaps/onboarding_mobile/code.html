<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SYNAPS | ONBOARDING</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary": "#e6e1df",
                        "surface-container-high": "#e8e8e6",
                        "surface-bright": "#f9f9f7",
                        "on-error": "#ffffff",
                        "on-background": "#0d0c0b",
                        "tertiary-container": "#777472",
                        "tertiary": "#3d3b3a",
                        "on-error-container": "#410002",
                        "primary": "#0d0c0b",
                        "primary-container": "#3d3b3a",
                        "on-primary": "#f5f5f3",
                        "surface": "#f5f5f3",
                        "secondary-fixed-dim": "#aeaaa8",
                        "secondary-container": "#d8d3d1",
                        "on-surface-variant": "#474747",
                        "on-primary-fixed": "#ffffff",
                        "on-primary-container": "#ffffff",
                        "background": "#f5f5f3",
                        "on-tertiary-fixed": "#ffffff",
                        "surface-tint": "#605e5c",
                        "tertiary-fixed": "#605e5c",
                        "on-secondary-container": "#1d1b1a",
                        "on-secondary-fixed": "#1d1b1a",
                        "on-primary-fixed-variant": "#e6e1df",
                        "inverse-on-surface": "#f1f1ef",
                        "surface-variant": "#e2e3e1",
                        "secondary": "#605e5c",
                        "inverse-primary": "#cac6c3",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#dadad8",
                        "error-container": "#ffdad6",
                        "inverse-surface": "#0d0c0b",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#484645",
                        "outline": "#0d0c0b",
                        "on-tertiary-container": "#ffffff",
                        "primary-fixed-dim": "#484645",
                        "primary-fixed": "#605e5c",
                        "on-surface": "#0d0c0b",
                        "surface-container-highest": "#e2e3e1",
                        "on-tertiary-fixed-variant": "#e6e1df",
                        "secondary-fixed": "#cac6c3",
                        "outline-variant": "#c6c6c6",
                        "surface-container-low": "#f4f4f2",
                        "surface-container": "#eeeeec",
                        "on-secondary-fixed-variant": "#3d3b3a",
                        "surface-container-lowest": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Geist", "sans-serif"],
                        "body": ["Geist", "sans-serif"],
                        "label": ["Geist", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .signature-shadow {
            box-shadow: 4px 4px 0px 0px #0d0c0b;
        }
        .signature-shadow-hover:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px #0d0c0b;
        }
        .mechanical-transition {
            transition: all 0.1s cubic-bezier(0.2, 1, 0.3, 1);
        }
        body {
            font-family: 'Geist', sans-serif;
            background-color: #f5f5f3;
            color: #0d0c0b;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex items-center justify-center min-h-screen p-6 overflow-x-hidden">
<!-- Onboarding Container -->
<main class="w-full max-w-md bg-surface border border-outline p-8 signature-shadow relative mechanical-transition">
<!-- Header Branding -->
<header class="mb-10 text-center">
<h1 class="text-3xl font-black tracking-[-0.04em] uppercase mb-2">SYNAPS</h1>
<p class="text-[0.6875rem] font-medium tracking-[0.05em] uppercase text-secondary">ARCHIVAL ONBOARDING SYSTEM</p>
</header>
<!-- Progress Indicator -->
<div class="mb-10">
<div class="flex justify-between items-end mb-2">
<span class="text-[0.6875rem] font-medium tracking-[0.05em] uppercase">STEP 01/02</span>
<span class="text-[0.6875rem] font-medium tracking-[0.05em] uppercase">PROFILE SETUP</span>
</div>
<div class="w-full h-[4px] bg-surface-container border border-outline">
<div class="h-full bg-primary w-1/2"></div>
</div>
</div>
<!-- Step 1: Identification -->
<section class="space-y-8" id="step-1">
<div class="space-y-6">
<!-- Field 1 -->
<div class="space-y-2">
<label class="text-[0.6875rem] font-medium tracking-[0.05em] uppercase block">ARCHIVE_IDENTIFIER</label>
<input class="w-full bg-surface border border-outline px-4 py-3 text-sm focus:ring-0 focus:outline-none placeholder:text-outline-variant font-medium tracking-tight" placeholder="FULL NAME" type="text"/>
</div>
<!-- Field 2 -->
<div class="space-y-2">
<label class="text-[0.6875rem] font-medium tracking-[0.05em] uppercase block">ACCESS_KEY_EMAIL</label>
<input class="w-full bg-surface border border-outline px-4 py-3 text-sm focus:ring-0 focus:outline-none placeholder:text-outline-variant font-medium tracking-tight" placeholder="EMAIL ADDRESS" type="email"/>
</div>
<!-- Field 3 -->
<div class="space-y-2">
<label class="text-[0.6875rem] font-medium tracking-[0.05em] uppercase block">ARCHIVAL_ROLE</label>
<select class="w-full bg-surface border border-outline px-4 py-3 text-sm focus:ring-0 focus:outline-none font-medium tracking-tight appearance-none">
<option>RESEARCHER</option>
<option>COLLECTOR</option>
<option>CONTRIBUTOR</option>
<option>OBSERVER</option>
</select>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary text-on-primary py-4 px-6 font-bold tracking-tighter uppercase text-sm mechanical-transition signature-shadow-hover flex justify-between items-center group">
<span>CONTINUE</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</section>
<!-- Step 2 Content (Hidden by default in static mockup, but styled for layout) -->
<!-- In a real app, this would swap. Here we demonstrate the requested Subject Grid for Step 2 as a separate block for visual verification -->
<section class="mt-16 pt-16 border-t border-outline border-dashed space-y-8" id="step-2">
<div class="flex justify-between items-end mb-2">
<span class="text-[0.6875rem] font-medium tracking-[0.05em] uppercase">STEP 02/02</span>
<span class="text-[0.6875rem] font-medium tracking-[0.05em] uppercase">INTEREST_INDEX</span>
</div>
<div class="w-full h-[4px] bg-surface-container border border-outline">
<div class="h-full bg-primary w-full"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Subject Cards -->
<div class="border border-outline p-4 mechanical-transition cursor-pointer hover:bg-primary hover:text-on-primary flex flex-col justify-between aspect-square group">
<span class="material-symbols-outlined text-xl">database</span>
<span class="text-[0.6875rem] font-bold tracking-[0.05em] uppercase">SYSTEMS</span>
</div>
<div class="border border-outline p-4 bg-primary text-on-primary mechanical-transition cursor-pointer flex flex-col justify-between aspect-square">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">history_edu</span>
<span class="text-[0.6875rem] font-bold tracking-[0.05em] uppercase">HISTORY</span>
</div>
<div class="border border-outline p-4 mechanical-transition cursor-pointer hover:bg-primary hover:text-on-primary flex flex-col justify-between aspect-square group">
<span class="material-symbols-outlined text-xl">architecture</span>
<span class="text-[0.6875rem] font-bold tracking-[0.05em] uppercase">STRUCTURE</span>
</div>
<div class="border border-outline p-4 mechanical-transition cursor-pointer hover:bg-primary hover:text-on-primary flex flex-col justify-between aspect-square group">
<span class="material-symbols-outlined text-xl">analytics</span>
<span class="text-[0.6875rem] font-bold tracking-[0.05em] uppercase">ANALYTICS</span>
</div>
<div class="border border-outline p-4 mechanical-transition cursor-pointer hover:bg-primary hover:text-on-primary flex flex-col justify-between aspect-square group">
<span class="material-symbols-outlined text-xl">security</span>
<span class="text-[0.6875rem] font-bold tracking-[0.05em] uppercase">ENCRYPTION</span>
</div>
<div class="border border-outline p-4 mechanical-transition cursor-pointer hover:bg-primary hover:text-on-primary flex flex-col justify-between aspect-square group">
<span class="material-symbols-outlined text-xl">memory</span>
<span class="text-[0.6875rem] font-bold tracking-[0.05em] uppercase">PROTOCOLS</span>
</div>
</div>
<!-- Action Button Step 2 -->
<button class="w-full bg-primary text-on-primary py-4 px-6 font-bold tracking-tighter uppercase text-sm mechanical-transition signature-shadow-hover flex justify-between items-center">
<span>GET STARTED</span>
<span class="material-symbols-outlined text-sm">check_circle</span>
</button>
</section>
<!-- Footer Decoration -->
<footer class="mt-12 flex justify-between items-center opacity-30 pointer-events-none">
<span class="text-[0.5rem] tracking-[0.2em] font-bold">SNPS_SYS_V2.0.4</span>
<span class="text-[0.5rem] tracking-[0.2em] font-bold">EST. 2024</span>
</footer>
</main>
<!-- Background Decoration (Brutalist Grid) -->
<div class="fixed inset-0 -z-10 pointer-events-none" style="background-image: radial-gradient(#0d0c0b 0.5px, transparent 0.5px); background-size: 24px 24px; opacity: 0.05;">
</div>
</body></html>
