<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SYNAPS - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        /* Brutalist Geist-inspired fonts using Inter for compatibility */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f5f3;
            color: #0d0c0b;
        }
        .signature-shadow {
            box-shadow: 4px 4px 0px 0px #0d0c0b;
        }
        .signature-shadow:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px #0d0c0b;
        }
        .signature-shadow:active {
            transform: translate(0px, 0px);
            box-shadow: 2px 2px 0px 0px #0d0c0b;
        }
        .brutalist-grid {
            background-image: linear-gradient(#0d0c0b 1px, transparent 1px), linear-gradient(90deg, #0d0c0b 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.03;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary": "#e6e1df",
                        "surface-container-high": "#e8e8e6",
                        "surface-bright": "#f9f9f7",
                        "on-error": "#ffffff",
                        "on-background": "#0d0c0b",
                        "tertiary-container": "#777472",
                        "tertiary": "#3d3b3a",

                        "background": "#f5f5f3",
                        "on-tertiary-fixed": "#ffffff",
                        "surface-tint": "#605e5c",
                        "tertiary-fixed": "#605e5c",
                        "on-secondary-container": "#1d1b1a",
                        "on-secondary-fixed": "#1d1b1a",
                        "on-primary-fixed-variant": "#e6e1df",
                        "inverse-on-surface": "#f1f1ef",
                        "surface-variant": "#e2e3e1",
                        "secondary": "#605e5c",
                        "inverse-primary": "#cac6c3",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#dadad8",
                        "error-container": "#ffdad6",
                        "inverse-surface": "#0d0c0b",

                        "primary-fixed-dim": "#484645",
                        "primary-fixed": "#605e5c",

                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]

                    borderRadius: {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",

            },

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-6 overflow-hidden">
<!-- Subtle brutalist background grid -->
<div class="fixed inset-0 brutalist-grid pointer-events-none"></div>
<main class="w-full max-w-md relative z-10">
<!-- Login Card -->
<div class="bg-surface border border-primary p-8 md:p-12 signature-shadow transition-all duration-150">
<!-- Branding -->
<div class="mb-12 text-center md:text-left">
<h1 class="text-4xl md:text-5xl font-black tracking-tighter uppercase mb-2">SYNAPS</h1>
<p class="text-[0.6875rem] font-medium tracking-[0.1em] uppercase opacity-60">Digital Archival Protocol v1.0</p>
</div>
<!-- Primary Action -->
<div class="space-y-4">
<button class="w-full bg-primary text-on-primary flex items-center justify-center gap-3 py-4 border border-primary signature-shadow transition-all duration-150 group">
<span class="material-symbols-outlined text-xl" data-icon="cloud">cloud</span>
<span class="text-[11px] font-bold tracking-[0.05em] uppercase">Continue with Google</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-4 py-4">
<div class="h-[1px] flex-1 bg-primary opacity-20"></div>
<span class="text-[9px] font-medium tracking-[0.1em] uppercase opacity-40">OR</span>
<div class="h-[1px] flex-1 bg-primary opacity-20"></div>
</div>
<!-- Secondary Action -->
<button class="w-full bg-transparent text-on-background flex items-center justify-center gap-3 py-4 border border-primary hover:bg-primary hover:text-on-primary transition-all duration-75">
<span class="text-[11px] font-bold tracking-[0.05em] uppercase">Browse without signing in</span>
</button>
</div>
<!-- Fine Print -->
<div class="mt-12 space-y-4">
<div class="flex flex-col gap-2">
<p class="text-[10px] leading-relaxed uppercase tracking-[0.02em] opacity-80 text-center md:text-left">
                        By continuing, you acknowledge the archival nature of this interface and agree to the 
                        <a class="underline font-bold hover:bg-primary hover:text-on-primary px-1" href="#">Terms of Operations</a> 
                        and 
                        <a class="underline font-bold hover:bg-primary hover:text-on-primary px-1" href="#">Privacy Protocols</a>.
                    </p>
</div>
<div class="pt-8 border-t border-primary border-opacity-10">
<div class="flex justify-between items-center text-[9px] font-medium tracking-[0.05em] opacity-40 uppercase">
<span>EST. 2024</span>
<span>NODE: 404-LOGIN</span>
</div>
</div>
</div>
</div>
<!-- Decorative Metadata -->
<div class="mt-8 flex justify-between items-end px-2 pointer-events-none">
<div class="space-y-1">
<div class="w-12 h-1 bg-primary"></div>
<div class="w-6 h-1 bg-primary"></div>
</div>
<div class="text-[10px] font-mono opacity-20 text-right">
                AUTH_KEY_REQUIRED<br/>
                SECURE_CHANNEL_READY
            </div>
</div>
</main>
<!-- Background Decoration for Brutalist Feel -->
<div class="fixed top-0 right-0 p-8 hidden md:block opacity-10 rotate-90 origin-top-right">
<span class="text-8xl font-black tracking-tighter uppercase whitespace-nowrap">ACCESS GRANTED</span>
</div>
<div class="fixed bottom-0 left-0 p-8 hidden md:block opacity-10 -rotate-90 origin-bottom-left">
<span class="text-8xl font-black tracking-tighter uppercase whitespace-nowrap">NO UNAUTHORIZED ENTRY</span>
</div>
</body></html>
